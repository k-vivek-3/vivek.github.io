<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivek Kasadwar | Resume</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Dark Slate background */
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents double scrollbars outside the PDF */
        }

        /* Fixed / Sticky Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-mini {
            width: 36px;
            height: 36px;
            background-color: #38bdf8;
            color: #0f172a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .meta-text h1 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .meta-text p {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Clean, beautiful Download Button */
        .btn-download {
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }

        /* Main Container for the Embed */
        .viewer-container {
            flex: 1;
            margin-top: 70px; /* Offset for the fixed header */
            width: 100%;
            height: calc(100vh - 70px);
            background-color: #0f172a;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="profile-mini">VK</div>
            <div class="meta-text">
                <h1>Vivek Kasadwar</h1>
                <p>Software Engineer & Application Developer</p>
            </div>
        </div>
        
        <a href="Vivek Kasadwar Resume.pdf" download="Vivek_Kasadwar_Resume.pdf" class="btn-download">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download PDF
        </a>
    </header>

    <div class="viewer-container">
        <iframe src="Vivek Kasadwar Resume.pdf" type="application/pdf"></iframe>
    </div>

</body>
</html>
