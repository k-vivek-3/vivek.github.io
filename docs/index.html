<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivek Kasadwar | Resume</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Sleek Dark Slate */
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            max-width: 480px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .profile-icon {
            width: 72px;
            height: 72px;
            background-color: #38bdf8; /* Soft blue accent */
            color: #0f172a;
            border-radius: 50%;
            margin: 0 auto 24px auto;
            line-height: 72px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .divider {
            height: 1px;
            background-color: #334155;
            margin: 24px 0;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .btn-primary:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            color: #cbd5e1;
            border: 1px solid #475569;
        }

        .btn-secondary:hover {
            background-color: #273549;
            border-color: #64748b;
            color: #ffffff;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-icon">VK</div>
        <h1>Vivek Kasadwar</h1>
        <p class="subtitle">Software Engineer & Application Developer</p>
        
        <div class="divider"></div>
        
        <div class="actions">
            <a href="docs/Vivek Kasadwar Resume.pdf" target="_blank" class="btn btn-primary">
                View Resume
            </a>
            
            <a href="docs/Vivek Kasadwar Resume.pdf" download="Vivek_Kasadwar_Resume.pdf" class="btn btn-secondary">
                Download PDF
            </a>
        </div>
        
        <p class="footer">Hosted via GitHub Pages</p>
    </div>

</body>
</html>
